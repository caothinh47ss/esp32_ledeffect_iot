<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 GPIO Controller</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>ESP32 GPIO Control</h1>
            <div class="connection-status" id="connection-status">Offline</div>
        </header>

        <!-- Login Form -->
        <div id="login-container" class="login-container">
            <form id="login-form" onsubmit="event.preventDefault(); login();">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Nhập email" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn-login">Đăng nhập</button>
                <p id="login-error" class="error-message"></p>
            </form>
        </div>

        <!-- Control Panel -->
        <div id="control-container" class="control-container" style="display: none;">
            <div class="leds-grid" id="leds-panel"></div>
            <button onclick="logout()" class="btn-logout">Đăng xuất</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
